name: Automated Odoo to Sheets Sync

on:
  schedule:
    # မြန်မာစံတော်ချိန် မနက် ၇:၃၀ နှင့် ည ၇:၃၀ တွင် တစ်နေ့ ၂ ကြိမ် Auto မောင်းမည့် စနစ်
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch: # ခလုတ်နှိပ်ပြီး ကိုယ်တိုင် ချက်ချင်း Run လို့ရအောင် လမ်းဖွင့်ထားခြင်း

jobs:
  sync-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        # 🛠️ FIXED: requirements.txt ဖိုင်ထဲက library အားလုံးကို အလိုအလျောက် သွင်းခိုင်းသည့် စနစ်ပြောင်းလိုက်ပါပြီ
        run: |
          pip install -r requirements.txt

      - name: Run Cloud Sync Worker
        run: python sync_worker.py
